<!DOCTYPE html>
<html>

<head>
    <title>
        HTML col bgcolor Attribute
    </title>
</head>

<body>

    <h2>HTML col bgcolor Attribute</h2>

    <table border="1" >
        <colgroup>
            <col span="2" bgcolor="green">
            <col bgcolor="blue">
        </colgroup>
        <tr>
            <th>Name</th>
            <th>Branch</th>
            <th>Expenses</th>
        </tr>

        <tr>
            <td>BITTU</td>
            <td>CSE</td>
            <td>2500.00</td>
        </tr>

        <tr>
            <td>RAKESH</td>
            <td>ECE</td>
            <td>1400.00</td>
        </tr>
    </table>
</body>

</html>
